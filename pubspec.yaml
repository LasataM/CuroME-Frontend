name: curome
description: CuroME - Dementia care companion app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # State management
  flutter_riverpod: ^2.5.1

  # Networking
  dio: ^5.4.3

  # Local storage
  sqflite: ^2.3.3
  path: ^1.9.0
  shared_preferences: ^2.2.3

  # Notifications
  firebase_messaging: ^15.0.3
  firebase_core: ^3.1.0
  flutter_local_notifications: ^17.1.2

  # Charts
  fl_chart: ^0.68.0

  # Utilities
  intl: ^0.19.0
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true